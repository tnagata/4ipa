name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project for macOS runner
        run: xcodegen generate

      - name: Build unsigned app archive on macOS runner
        run: |
          xcodebuild -project CemaApp.xcodeproj \
            -scheme CemaApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/CemaApp.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=\"\" \
            PROVISIONING_PROFILE_SPECIFIER=\"\" \
            DEVELOPMENT_TEAM=\"\"

      - name: Package IPA from Xcode archive
        run: |
          set -e

          echo '=== Finding archived app bundle ==='
          APP_PATH="build/CemaApp.xcarchive/Products/Applications/CemaApp.app"
          if [ ! -d "$APP_PATH" ]; then
            echo 'Archived app bundle was not found.'
            exit 1
          fi

          echo "Using app bundle: $APP_PATH"

          APP_NAME=$(basename "$APP_PATH")
          rm -rf Payload dummy
          mkdir -p Payload dummy
          mkdir -p "Payload/$APP_NAME"
          cp -R "$APP_PATH"/. "Payload/$APP_NAME/"
          chmod -R 755 "Payload/$APP_NAME"

          echo '=== Payload contents ==='
          find Payload -maxdepth 3 -print | sort

          echo '=== Creating IPA archive ==='
          python3 - <<'PY'
from pathlib import Path
import zipfile

payload_dir = Path('Payload')
ipa_path = Path('dummy/CemaApp.ipa')
ipa_path.parent.mkdir(parents=True, exist_ok=True)

with zipfile.ZipFile(ipa_path, 'w', compression=zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
    for path in sorted(payload_dir.rglob('*')):
        if path.is_file():
            zf.write(path, path.as_posix())

print(f'Created {ipa_path}')
PY

          echo '=== IPA archive contents ==='
          unzip -l dummy/CemaApp.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: dummy/