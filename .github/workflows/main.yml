name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project for macOS runner
        run: xcodegen generate

      - name: Build unsigned app on macOS runner
        run: |
          xcodebuild -project CemaApp.xcodeproj \
            -scheme CemaApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=\"\" \
            PROVISIONING_PROFILE_SPECIFIER=\"\" \
            DEVELOPMENT_TEAM=\"\"

      - name: Package IPA
        run: |
          set -e

          APP_PATH=$(find build/DerivedData -name '*.app' -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo 'Built app bundle was not found.'
            exit 1
          fi

          APP_NAME=$(basename "$APP_PATH")
          rm -rf Payload dummy
          mkdir -p Payload dummy
          cp -R "$APP_PATH" "Payload/$APP_NAME"
          chmod -R 755 "Payload/$APP_NAME"

          echo 'Payload contents:'
          find Payload -maxdepth 3 -print | sort

          (cd . && zip -r dummy/CemaApp.ipa Payload)

          echo 'IPA archive contents:'
          unzip -l dummy/CemaApp.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: dummy/